<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>To Do</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">     
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  </head>
  <body>
    
    <nav class="nav-extended blue">
      <div class="nav-wrapper">
        <a href="#" class="brand-logo">Todo App</a>   
        <ul id="nav-mobile" class="right">
          <li><a href="#" onclick="logout()">Log out</a></li>
        </ul>  
      </div>
      <div class="nav-content">
        <ul class="tabs tabs-transparent">
          <li class="tab"><a class="active" href="#todo">To Do</a></li>
          <li class="tab"><a href="#search">Image Search</a></li>
        </ul>
      </div>
    </nav>

    <main class="container">
      
      <section id="todo" class="col s12">
        <div class="card">
          <div class="card-content">
            <span class="card-title">Create Todo</span>
            <form name="addForm">
              <div class="input-field">
                <textarea name="addText" placeholder="enter to-do" class="materialize-textarea"></textarea>
                <label for="addText">Enter todo Text</label>
              </div>
              <input class="blue btn white-text" type="submit" value="SAVE" />
            </form>
          </div>
        </div>

        <ul class="collection with-header" id="result">
            <li class="collection-header"><h4>My Tasks</h4></li>
        </ul>
      </section>

      <section id="search" class="col s12">
        <div class="card">
          <div class="card-content">
            <span class="card-title">Image Search</span>
            <p>Tab 2 Content - Search functionality goes here.</p>
          </div>
        </div>
      </section>

    </main>

    <script src="util.js"></script>
    <script src="app.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var el = document.querySelectorAll('.tabs');
        M.Tabs.init(el);
      });
    </script>
  </body>
</html>
